name: Generate Gantt Chart

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate Gantt
        uses: realm/github-gantt@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          output: gantt.svg
